name: Build and Publish Wheels

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CUDA_VERSION: '13.1.0'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        # ubuntu-latest = Linux x86_64
        # windows-latest = Windows x86_64
        # macos-14 = macOS arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      # Windows specific: Setup MSVC
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      # Windows specific: Cache and setup CUDA Toolkit
      - name: Cache CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cuda-cache
        with:
          path: |
            C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
          key: cuda-windows-${{ env.CUDA_VERSION }}

      - name: Setup CUDA Toolkit (Windows)
        if: runner.os == 'Windows' && steps.cuda-cache.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@4bd727d5619dc6fa323b1e76c3aa5dca94f5ec6d # v0.2.19
        id: cuda-toolkit
        with:
          cuda: '13.1.0'

      - name: Add CUDA to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v13.1\\bin" >> $GITHUB_PATH
          echo "CUDA_PATH=C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v13.1" >> $GITHUB_ENV

      # Linux specific: CUDA requires installing toolkit inside the manylinux container
      # We let cibuildwheel handle Linux containers, but we need to configure it

      - name: Install cibuildwheel
        run: python -m pip install "cibuildwheel>=2.22.0"

      - name: Cache Rust
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/cpu/gafime_cpu/target
          key: rust-${{ runner.os }}-${{ hashFiles('src/cpu/gafime_cpu/Cargo.lock', 'src/cpu/gafime_cpu/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Limit Python versions to save time in CI (3.10 to 3.14)
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*" # Skip musl
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          
          # Upgrade from CentOS 7 (manylinux2014) to AlmaLinux 8 (manylinux_2_28)
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          
          # We need Rust to compile gafime_cpu, and the CUDA Toolkit to compile gafime_cuda
          CIBW_BEFORE_ALL_LINUX: "curl https://sh.rustup.rs -sSf | sh -s -- -y && dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo && dnf clean all && dnf install -y cuda-nvcc-13-1 cuda-cudart-devel-13-1 && ln -sf /usr/local/cuda-13.1 /usr/local/cuda"
          CIBW_BEFORE_ALL_MACOS: "curl https://sh.rustup.rs -sSf | sh -s -- -y && source $HOME/.cargo/env"
          CIBW_BEFORE_ALL_WINDOWS: "rustup default stable"
          
          CIBW_BEFORE_BUILD_WINDOWS: "pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"
          
          CIBW_ENVIRONMENT: "STRICT_CPU=1 PATH=$HOME/.cargo/bin:$PATH"
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:/usr/local/cuda/bin:$PATH STRICT_CPU=1 STRICT_CUDA=1"
          CIBW_ENVIRONMENT_WINDOWS: "STRICT_CPU=1 STRICT_CUDA=1"
          
          CIBW_TEST_REQUIRES: "pytest scikit-learn"
          CIBW_TEST_COMMAND: "pytest {project}/tests/test_distribution.py {project}/tests/test_sklearn.py -v --tb=short"

      - name: List wheel contents
        shell: bash
        run: |
          for whl in wheelhouse/*.whl; do
            echo "=== $(basename $whl) ==="
            python -m zipfile -l "$whl" | grep -E '\.(so|dll|dylib|pyd|metallib)$' || echo '  (no native binaries found!)'
            echo
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  release:
    name: Publish to GitHub Releases
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Release Note
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    # Required for Trusted Publishing
    permissions:
      id-token: write
      contents: read
      
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
